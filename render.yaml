services:
  - type: web
    name: my-portfolio
    env: static
    buildCommand: yarn install && yarn build
    startCommand: serve -s build
    envVars:
      - key: NODE_ENV
        value: production
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

        services:
  - type: web
    name: my-portfolio-website
    env: static
    buildCommand: yarn build
    startCommand: serve -s build
    staticPublishPath: build










